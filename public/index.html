<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizArena - Interactive Quiz Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .hero-container {
            max-width: 800px;
            padding: 40px 20px;
            animation: fadeIn 1s ease-in-out;
            width: 100%;
            box-sizing: border-box;
        }

        h1 {
            font-size: 5rem;
            font-weight: 800;
            margin-bottom: 20px;
            margin-top: 0;
            text-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .title-highlight {
            color: #00bcd4; /* Light Blue focus requested */
        }

        p {
            font-size: 1.5rem;
            font-weight: 300;
            margin-bottom: 40px;
            color: rgba(255, 255, 255, 0.8);
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .btn-start {
            background: linear-gradient(45deg, #007bff, #00bcd4);
            color: #fff;
            box-shadow: 0 8px 20px rgba(0, 188, 212, 0.4);
            border: none;
        }

        .btn-start:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0, 188, 212, 0.6);
        }

        .btn-login {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .btn-login:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-3px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            h1 { font-size: 3.5rem; }
            .buttons { flex-direction: column; }
            .btn { width: 100%; box-sizing: border-box; }
        }
    </style>
</head>
<body>
    <div class="hero-container">
        <h1><span class="title-highlight">Quiz</span>Arena</h1>
        <p>Join the arena. Test your knowledge. Claim victory.</p>
        <div class="buttons">
            <a href="/join" class="btn btn-start">Start Quiz</a>
            <a href="/login" class="btn btn-login">Admin Login &rarr;</a>
        </div>
    </div>
</body>
</html>
